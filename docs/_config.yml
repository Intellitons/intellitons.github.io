title: Intellitons Blog
title_zh: Intellitons（智子）博客
tagline: Spectral essays on collective modes inside large language models
description: >-
  Popular science articles about Intellitons — the quasi-particle-like collective
  excitation modes discovered inside large language models.
description_zh: >-
  面向大众的 Intellitons（智子）科普博客，介绍大语言模型内部类似准粒子的集体激发模式。
baseurl: "/"
url: "https://Intellitons.github.io"
lang: en
locale: en_US
logo: "/assets/icons/android-chrome-512x512.png"
image: "/assets/icons/android-chrome-512x512.png"
repository: xiongzhp/Intelliton

social:
  name: Intellitons Project
  links:
    - https://github.com/xiongzhp/Intelliton

twitter:
  card: summary_large_image

# Set this to your GA4 Measurement ID, for example G-XXXXXXXXXX.
google_analytics_id: G-BMF6JP5HTX

theme: minima

author:
  name: Intellitons Project

show_excerpts: true

minima:
  skin: classic

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

future: true

markdown: kramdown
highlighter: rouge

kramdown:
  math_engine: mathjax
  parse_block_html: true

defaults:
  - scope:
      path: ""
    values:
      image: "/assets/icons/android-chrome-512x512.png"
  - scope:
      path: ""
      type: "posts"
    values:
      author: Intellitons Project
